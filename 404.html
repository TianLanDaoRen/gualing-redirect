<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>页面正在跳转...</title>
    <script type="text/javascript">
        // 替换为你的新域名
        var newDomain = "https://gualing.top";
        // 获取当前访问的路径和参数，并拼接到新域名后面
        var currentPath = window.location.pathname + window.location.search + window.location.hash;
        // 执行重定向跳转
        window.location.replace(newDomain + currentPath);
    </script>
    <meta http-equiv="refresh" content="0; url=https://gualing.top" />
</head>
<body>
    <p>网站已搬家，正在为您跳转。如果没有自动跳转，请<a href="https://gualing.top">点击这里访问新网站 gualing.top</a>。</p>
</body>
</html>
